#{0} is the number of days in the interval
FORMAT_DAYS="{0,number,##0}j "

#{0} <- hours, {1} <- mins, {2} <- secs
FORMAT_HMS="{0,number,00}:{1,number,00}:{2,number,00}"

#{0} <- milliseconds
FORMAT_MS=",{0,number,000}"