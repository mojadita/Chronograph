#A font name
LABELS_FONT=Courier 16
#Value assigned to the Total JLabel of the Chronograph
TOTAL_TITLE=\u0418\u0442\u043e\u0433\u043e
LAPSE_TITLE=\u041f\u0440\u043e\u0432\u0430\u043b
#First parameter is the button action name, second is the duration of the click in msec.
BUTTON_CLICK_DELAY_MESSAGE_FORMAT={}: \u0414\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043a\u043b\u0438\u043a\u0430: {}
#Value of the start action name for the start button
START_ACTION_NAME=\u041d\u0430\u0447\u0438\u043d\u0430\u0442\u044c
#Value of the action name for lapse button
LAPSE_ACTION_NAME=\u041f\u0440\u043e\u0432\u0430\u043b
#Name of the action for the Stop button
STOP_ACTION_NAME=\u0421\u0442\u043e\u043f
#Name of the action associated with the Reset button
RESET_ACTION_NAME=\u0421\u0431\u0440\u043e\u0441
#format for presenting in JLabel the cronograph values {0} is used for the locale formated number of days
#(1} is the HH:MM:SS timestamp, and {2} is the .mmm milliseconds value.
TIMESTAMP_LABEL_FORMAT=<html><font size=+2>{0}{1}</font>{2}
